[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Solidity compiler settings
solc = "0.8.27"
evm_version = "cancun"
via_ir = false

# Optimizer settings
optimizer = true
optimizer_runs = 200

# Testing settings
ffi = true
verbosity = 2
# FHE clearing is intentionally multi-block: each keeper call is its own transaction.
# `isolate` makes Foundry run each top-level call as a separate tx so the per-tx HCU budget
# (and transient storage) resets between calls, matching on-chain behaviour.
isolate = true
gas_limit = "18446744073709551615"

# Formatter settings
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"

# Sepolia RPC configuration
[rpc_endpoints]
sepolia = "${RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
